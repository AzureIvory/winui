name: CI

on:
  pull_request:
  push:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: windows go${{ matrix.go-version }} cgo${{ matrix.cgo }}
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        go-version:
          - "1.24.x"
        cgo:
          - "0"
          - "1"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}
          cache: true

      - name: Setup MinGW for cgo
        if: matrix.cgo == '1'
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: mingw-w64-x86_64-gcc

      - name: Export cgo toolchain
        if: matrix.cgo == '1'
        shell: powershell
        run: |
          "C:\msys64\mingw64\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          "CC=C:\msys64\mingw64\bin\gcc.exe" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "CXX=C:\msys64\mingw64\bin\g++.exe" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Check formatting
        if: matrix.cgo == '0'
        shell: powershell
        run: |
          $unformatted = Get-ChildItem -Path . -Recurse -Filter *.go -File |
            Where-Object { $_.FullName -notmatch '\\vendor\\' } |
            ForEach-Object { gofmt -l $_.FullName } |
            Where-Object { $_ }
          if ($unformatted) {
            $unformatted | ForEach-Object { Write-Host $_ }
            throw "gofmt check failed"
          }

      - name: Go test
        shell: powershell
        env:
          CGO_ENABLED: ${{ matrix.cgo }}
        run: go test ./...

      - name: Go vet
        shell: powershell
        env:
          CGO_ENABLED: ${{ matrix.cgo }}
        run: go vet ./...
