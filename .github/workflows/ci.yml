name: CI

on:
  pull_request:
  push:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: windows go${{ matrix.go-version }} cgo${{ matrix.cgo }}
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        go-version:
          - "1.24.x"
        cgo:
          - "0"
          - "1"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}
          cache: true

      - name: Setup MinGW for cgo
        if: matrix.cgo == '1'
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: mingw-w64-x86_64-gcc

      - name: Export cgo toolchain
        if: matrix.cgo == '1'
        shell: powershell
        run: |
          $gccPath = $null

          $command = Get-Command gcc -ErrorAction SilentlyContinue
          if ($command) {
            $gccPath = $command.Source
          }

          if (-not $gccPath) {
            $roots = @($env:RUNNER_TEMP, 'C:\msys64', 'D:\a\_temp')
            foreach ($root in $roots) {
              if (-not $root -or -not (Test-Path $root)) {
                continue
              }

              $candidate = Get-ChildItem -Path $root -Filter gcc.exe -Recurse -ErrorAction SilentlyContinue |
                Where-Object { $_.FullName -match '[\\/](mingw64|ucrt64)[\\/]bin[\\/]gcc\.exe$' } |
                Select-Object -First 1 -ExpandProperty FullName
              if ($candidate) {
                $gccPath = $candidate
                break
              }
            }
          }

          if (-not $gccPath) {
            throw 'gcc.exe not found after msys2 setup'
          }

          $binDir = Split-Path -Path $gccPath -Parent
          $gxxPath = Join-Path -Path $binDir -ChildPath 'g++.exe'
          if (-not (Test-Path $gxxPath)) {
            throw "g++.exe not found next to gcc.exe in $binDir"
          }

          $binDir | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          "CC=$gccPath" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "CXX=$gxxPath" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Check formatting
        if: matrix.cgo == '0'
        shell: powershell
        run: |
          $unformatted = git ls-files '*.go' |
            ForEach-Object { gofmt -l $_ } |
            Where-Object { $_ }
          if ($unformatted) {
            $unformatted | ForEach-Object { Write-Host $_ }
            throw "gofmt check failed"
          }

      - name: Go test
        shell: powershell
        env:
          CGO_ENABLED: ${{ matrix.cgo }}
        run: go test ./...

      - name: Go vet
        shell: powershell
        env:
          CGO_ENABLED: ${{ matrix.cgo }}
        run: go vet ./...
