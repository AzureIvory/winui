<window title="Markup Demo" icon="assets/app.ico" min-width="980" min-height="720">
  <body id="page" style="display:absolute; background:#f2f6fb;">
    <label id="title" style="left:20px; top:20px; width:360px; height:28px; font-size:18px;">Markup HTML -> WinUI Demo</label>

    <input id="pwd" type="password" placeholder="Enter password"
           style="left:20px; top:60px; width:220px; height:36px;"
           onchange="pwdChanged" onsubmit="pwdSubmit" />

    <button id="saveBtn" icon="assets/save.ico" icon-position="left"
            style="left:260px; top:56px; width:140px; height:40px; color:#0f172a; down-text-color:#ffffff; background:#f5f9ff; hover-background:#e0f2fe; pressed-background:#2563eb; border-color:#9dbfe8; border-radius:10px; padding:12px; gap:8px;"
            onclick="save">
      Save
    </button>

    <button id="legacyBtn"
            style="left:410px; top:56px; width:140px; height:40px; background:#ffffff; hover-background:#eef6ff; pressed-background:#1d4ed8; disabled-background:#e2e8f0; border-color:#b9c9dd; border-radius:10px;"
            onclick="legacyOnly">
      Legacy Actions
    </button>

    <select id="citySelect" placeholder="Choose city"
            style="left:560px; top:60px; width:220px; height:36px; color:#1f2937; placeholder-color:#94a3b8; background:#ffffff; border-color:#cbd5e1; hover-border-color:#60a5fa; focus-border-color:#2563eb; arrow-color:#2563eb; popup-background:#ffffff; item-hover-color:#eff6ff; item-selected-color:#2563eb; item-text-color:#ffffff; padding:10px; border-radius:10px; item-height:34px; max-visible-items:5;">
      <option value="bj">Beijing</option>
      <option value="sh" selected>Shanghai</option>
      <option value="sz">Shenzhen</option>
    </select>

    <listbox id="cityList"
             style="left:20px; top:110px; width:220px; height:160px; color:#1f2937; disabled-text-color:#94a3b8; background:#ffffff; border-color:#cbd5e1; hover-border-color:#60a5fa; focus-border-color:#2563eb; item-hover-color:#eff6ff; item-selected-color:#2563eb; item-text-color:#ffffff; padding:8px; border-radius:10px; item-height:34px;"
             onchange="cityChanged"
             onactivate="cityOpen">
      <option value="bj">Beijing</option>
      <option value="sh" selected>Shanghai</option>
      <option value="sz">Shenzhen</option>
    </listbox>

    <progress id="uploadProgress" value="72"
              style="left:260px; top:120px; width:280px; height:24px; color:#ffffff; track-color:#dbeafe; fill-color:#2563eb; bubble-color:#1d4ed8; border-radius:12px; show-percent:true;" />

    <checkbox id="newsCheck"
              style="left:260px; top:168px; width:240px; height:28px; color:#1f2937; disabled-text-color:#94a3b8; background:#ffffff; border-color:#cbd5e1; hover-border-color:#38bdf8; focus-border-color:#0ea5e9; indicator-color:#0ea5e9; check-color:#ffffff; indicator-style:check; hover-background:#f0f9ff; disabled-background:#f3f4f6; disabled-border-color:#d1d5db; border-radius:6px; indicator-size:18px; indicator-gap:10px;"
              checked>Subscribe updates</checkbox>

    <textarea id="notes" placeholder="Multi-line notes"
              style="left:260px; top:210px; width:300px; height:120px; color:#1f2937; placeholder-color:#94a3b8; background:#ffffff; border-color:#cbd5e1; hover-border-color:#60a5fa; focus-border-color:#2563eb; disabled-text-color:#94a3b8; disabled-background:#f3f4f6; caret-color:#2563eb; padding:10px; border-radius:10px;">Supports right / bottom constraints and DPI-aware layout.</textarea>

    <animated-img id="spinner" src="assets/spinner.gif" autoplay="true"
                  style="left:580px; top:120px; width:48px; height:48px;" />

    <label id="dialogsTitle" style="left:20px; top:300px; width:260px; height:24px; font-size:16px;">Native File Dialogs</label>

    <input id="openFile" type="file" accept=".txt,.md,.go"
           dialog-title="Open a source file" button-text="Open..."
           value="README.md" onchange="openPicked"
           style="left:20px; top:336px; width:420px; height:36px; color:#1f2937; placeholder-color:#94a3b8; background:#ffffff; border-color:#cbd5e1; hover-border-color:#60a5fa; focus-border-color:#2563eb; caret-color:#2563eb; padding:10px; border-radius:10px; button-background:#f5f9ff; button-hover-background:#e0f2fe; button-pressed-background:#2563eb; button-border-color:#9dbfe8; button-gap:8px; button-padding:12px; button-border-radius:10px;" />

    <input id="saveFile" type="file" dialog="save"
           dialog-title="Save exported report" dialog-button-text="Save"
           button-text="Save..." default-extension="txt"
           filters="Text Files=*.txt,Markdown=*.md,All Files=*.*"
           placeholder="No export path selected" onchange="savePicked"
           style="left:20px; top:384px; width:420px; height:36px; color:#1f2937; placeholder-color:#94a3b8; background:#ffffff; border-color:#cbd5e1; hover-border-color:#60a5fa; focus-border-color:#2563eb; padding:10px; border-radius:10px;" />

    <input id="folderPick" type="file" dialog="folder"
           dialog-title="Choose a working directory" button-text="Folder..."
           placeholder="No folder selected" onchange="folderPicked"
           style="left:20px; top:432px; width:420px; height:36px; color:#1f2937; placeholder-color:#94a3b8; background:#ffffff; border-color:#cbd5e1; hover-border-color:#60a5fa; focus-border-color:#2563eb; padding:10px; border-radius:10px;" />

    <input id="multiFiles" type="file" multiple value-separator=" | "
           dialog-title="Choose multiple project files" button-text="Multi..."
           accept=".go,.md,.txt" onchange="multiPicked"
           style="left:20px; top:480px; width:420px; height:36px; color:#1f2937; placeholder-color:#94a3b8; background:#ffffff; border-color:#cbd5e1; hover-border-color:#60a5fa; focus-border-color:#2563eb; padding:10px; border-radius:10px;" />

    <panel id="dialogsNote"
           style="display:absolute; left:470px; top:336px; right:20px; height:180px; background:#ffffff; border-color:#b9c9dd; border-width:1px; border-radius:12px;">
      <label id="dialogsNoteText" style="left:16px; top:16px; right:16px; bottom:16px; text-align:left;">Use &lt;input type="file"&gt; with dialog="open|save|folder", multiple, accept, filters, button-text, dialog-title, default-extension, and value-separator.</label>
    </panel>

    <panel id="statusBox"
           style="display:absolute; left:20px; right:20px; bottom:20px; height:110px; background:#ffffff; border-color:#b9c9dd; border-width:1px; border-radius:12px;">
      <label id="status" style="left:12px; top:10px; right:12px; bottom:10px; height:90px; text-align:left;">Waiting for actions</label>
    </panel>
  </body>
</window>
